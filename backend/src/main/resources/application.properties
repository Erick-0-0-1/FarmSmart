# Server Configuration
server.port=${PORT:8080}

# Static file serving for React frontend
spring.web.resources.static-locations=classpath:/META-INF/resources,classpath:/resources,classpath:/static,file:frontend-build
spring.mvc.static-path-pattern=/**

# Database Configuration (Render will provide DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration - MUST be set in production environment
# For local development, you can set: JWT_SECRET=dev-secret-key-change-in-production-make-it-very-long-and-random
# Or generate a random key: openssl rand -base64 32
# IMPORTANT: Default fallback is ONLY for development. In production, JWT_SECRET MUST be set.
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min-32chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Only run data.sql if tables are empty
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Static file serving for React frontend
spring.web.resources.static-locations=classpath:/META-INF/resources,classpath:/resources,classpath:/static,file:frontend-build
spring.mvc.static-path-pattern=/**

# Weather API Configuration
# IMPORTANT: Replace with your own API key from https://openweathermap.org/api
weather.api.key=${WEATHER_API_KEY:demo-key-requires-replacement}
weather.api.url=https://api.openweathermap.org/data/2.5
weather.default.location=Isabela,PH
weather.default.lat=16.9754
weather.default.lon=121.8107






