# Production-specific configuration
# This file is activated when SPRING_PROFILES_ACTIVE=production

# Server Configuration
server.port=${PORT:8080}

# Database - Use PostgreSQL in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/agriconnect}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Static file serving for React frontend
spring.web.resources.static-locations=classpath:/META-INF/resources,classpath:/resources,classpath:/static,file:frontend-build
spring.mvc.static-path-pattern=/**

# Disable H2 console in production
spring.h2.console.enabled=false

# SQL Initialization - disabled in production (use migrations instead)
spring.sql.init.mode=never

# Logging - more verbose in production
logging.level.com.agriconnect.backend=INFO
logging.level.org.springframework.web=WARN

# CORS - should be explicitly set in production
allowed.origins=${ALLOWED_ORIGINS}

# JWT - MUST be set via environment variable in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Weather API
weather.api.key=${WEATHER_API_KEY}
weather.api.url=https://api.openweathermap.org/data/2.5
