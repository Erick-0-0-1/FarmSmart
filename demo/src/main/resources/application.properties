# Server Configuration
spring.application.name=AgriConnect Backend
server.port=8080

# MariaDB Database Configuration (LARAGON)
spring.datasource.url=jdbc:mariadb://localhost:3306/agriconnect_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=agriconnect-secret-key-please-change-this-in-production
jwt.expiration=86400000

# SQL Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.main.jvm-arguments=--enable-native-access=ALL-UNNAMED

# Weather API Configuration
weather.api.key=0eb64d3e8101e05747544826021349da
weather.api.url=https://api.openweathermap.org/data/2.5
weather.default.location=Isabela,PH
weather.default.lat=16.9754
weather.default.lon=121.8107






