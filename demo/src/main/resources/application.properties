# Server Configuration
spring.application.name=AgriConnect Backend
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:4307/agriconnect_db
spring.datasource.username=root
spring.datasource.password=Root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (we'll use this later)
jwt.secret=agriconnect-secret-key-please-change-this-in-production
jwt.expiration=86400000