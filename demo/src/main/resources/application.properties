# Server Configuration
spring.application.name=AgriConnect Backend
server.port=8080

# Database Configuration - Will use Railway's DATABASE_URL
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://localhost:3306/agriconnect_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-make-it-very-long-and-random}
jwt.expiration=86400000

# CORS - Will be updated after deployment
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,https://localhost:3000}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.agriconnect.backend=INFO
logging.level.org.springframework.web=INFO

spring.jpa.properties.hibernate.format_sql=true


# SQL Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.main.jvm-arguments=--enable-native-access=ALL-UNNAMED

# Weather API Configuration
weather.api.key=0eb64d3e8101e05747544826021349da
weather.api.url=https://api.openweathermap.org/data/2.5
weather.default.location=Isabela,PH
weather.default.lat=16.9754
weather.default.lon=121.8107






