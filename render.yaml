services:
  - type: web
    name: farmsmart-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "${ALLOWED_ORIGINS}"
      - key: DATABASE_URL
        value: "${DATABASE_URL}"